<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReelSpin — Spin to Watch</title>
<meta name="description" content="Can't decide what to watch? Flick the lens. Let fate decide.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafaf8;--ink:#111;--mute:#888;--dim:#bbb;--line:#e8e6e2;--card:#fff;--accent:#c4a265;--surface:#f2f0ec;--gold:#c4a265}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:'Figtree',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes tickPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(196,162,101,.2)}50%{box-shadow:0 0 40px rgba(196,162,101,.4)}}
@keyframes streakPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

/* ═══ MAIN LAYOUT: Two panels ═══ */
.app-container{height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ═══ WHEEL SCREEN (full screen) ═══ */
.wheel-screen{flex:none;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:radial-gradient(ellipse at 50% 40%,#fff,var(--bg));transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:10;touch-action:none}
.wheel-screen.up{transform:translateY(-100vh)}

/* Streak bar */
.streak-bar{position:absolute;top:0;left:0;right:0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;z-index:5}
.streak-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mute);font-weight:500}
.streak-num{font-family:'Instrument Serif',serif;font-size:18px;color:var(--gold);font-weight:400}

/* Logo on wheel screen */
.wheel-logo{font-family:'Instrument Serif',serif;font-size:36px;font-weight:400;letter-spacing:-1px;margin-bottom:6px}
.wheel-logo em{font-style:italic;color:var(--gold)}
.wheel-subtitle{font-size:13px;color:var(--dim);margin-bottom:28px;font-style:italic;font-family:'Instrument Serif',serif}

/* Lens */
.lens-wrap{position:relative;width:280px;height:280px;margin:0 auto}
@media(min-width:500px){.lens-wrap{width:340px;height:340px}}
.lens-body{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;box-shadow:0 0 0 6px #ddd,0 0 0 8px #bbb,0 0 0 12px #ddd,0 4px 30px rgba(0,0,0,.12);background:#e8e6e2;touch-action:none;cursor:grab;transition:transform .1s linear}
.lens-body:active{cursor:grabbing}
.lens-body .seg{position:absolute;inset:0}
.lens-inner-ring{position:absolute;inset:10%;border-radius:50%;border:2px solid rgba(0,0,0,.08);pointer-events:none;z-index:3}
.lens-inner-ring2{position:absolute;inset:22%;border-radius:50%;border:1.5px solid rgba(0,0,0,.06);pointer-events:none;z-index:3}
.lens-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#999,#666);border:2px solid #aaa;z-index:4;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.lens-glass{position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 35% 30%,rgba(255,255,255,.15),transparent 60%);pointer-events:none;z-index:4}
.lens-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:16px solid var(--ink);z-index:5;filter:drop-shadow(0 2px 3px rgba(0,0,0,.15))}

/* Wheel slots */
.wheel-slots{display:flex;gap:12px;margin-top:28px;align-items:center}
.wslot{width:56px;height:84px;border-radius:8px;border:2px dashed var(--dim);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:var(--surface);transition:all .2s}
.wslot.filled{border-style:solid;border-color:var(--ink)}
.wslot img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.wslot .rm{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Spin controls */
.spin-controls{margin-top:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.spin-btn{padding:14px 36px;border-radius:10px;background:var(--ink);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Instrument Serif',serif;font-style:italic;transition:all .2s;letter-spacing:.5px}
.spin-btn:hover{background:#333}
.spin-btn:disabled{opacity:.3;cursor:default}
.spin-btn:active{transform:scale(.97)}
.fill-btn{padding:10px 18px;border-radius:8px;background:var(--surface);border:1px solid var(--line);color:var(--mute);font-size:12px;cursor:pointer;font-family:inherit}
.swipe-hint{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:11px;color:var(--dim)}
.swipe-hint span{display:inline-block;animation:tickPulse 1.5s infinite}

/* ═══ BROWSE SCREEN (scrollable catalog) ═══ */
.browse-screen{position:absolute;top:100vh;left:0;right:0;height:100vh;background:var(--bg);transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:20;overflow-y:auto;-webkit-overflow-scrolling:touch}
.browse-screen.up{transform:translateY(-100vh)}
.browse-header{position:sticky;top:0;z-index:30;background:rgba(250,250,248,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:10px 16px}
.browse-back{padding:8px 14px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--ink);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:6px}
.logo-sm{font-family:'Instrument Serif',serif;font-size:18px}
.logo-sm em{font-style:italic;color:var(--gold)}

/* Search */
.sbox{flex:1;min-width:140px;position:relative}
.sbox input{width:100%;padding:9px 70px 9px 34px;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-size:13px;font-family:inherit;outline:none}
.sbox input:focus{border-color:var(--ink)}
.sbox input::placeholder{color:var(--dim)}
.sbtn{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:var(--ink);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:10px;cursor:pointer;font-weight:600;font-family:inherit;letter-spacing:.5px;text-transform:uppercase}

/* Chips */
.chips{display:flex;gap:5px;overflow-x:auto;padding:4px 0}
.chips::-webkit-scrollbar{height:2px}
.chip{padding:4px 12px;border-radius:18px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .12s;user-select:none;flex-shrink:0;background:transparent;border:1px solid var(--line);color:var(--mute)}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:14px;overflow-x:auto}
.tab{padding:8px 14px;font-size:11px;font-weight:500;color:var(--mute);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:700}

/* Grid */
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));padding:0 16px 100px}
@media(min-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}}
.card{border-radius:8px;overflow:hidden;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:all .2s;animation:slideUp .3s ease both;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.card .poster{aspect-ratio:2/3;overflow:hidden;background:var(--surface);position:relative}
.card .poster img{width:100%;height:100%;object-fit:cover}
.card .info{padding:8px 10px}
.card .info h3{font-size:11px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .info p{font-size:9px;color:var(--mute);margin-top:2px}
.rbadge{position:absolute;bottom:6px;left:6px;padding:2px 7px;border-radius:4px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;font-weight:700}
.abtn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:var(--ink);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:3}
.abtn.added{background:var(--gold)}

/* Overlays */
.ov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.ov-dark{background:rgba(0,0,0,.88)}
.ov-light{background:rgba(250,250,248,.98);overflow-y:auto;padding:16px 0}
.modal-card{background:#fff;border-radius:14px;max-width:580px;width:94%;max-height:88vh;overflow-y:auto;border:1px solid var(--line);box-shadow:0 16px 50px rgba(0,0,0,.1);animation:bounceIn .35s cubic-bezier(.34,1.56,.64,1);position:relative;margin:auto}
.close-btn{position:absolute;top:10px;right:10px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.65);border:2px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px)}
.close-btn-light{background:var(--surface);border:1px solid var(--line);color:var(--ink)}

.shim{background:linear-gradient(90deg,#f0eeea 25%,#e8e6e2 50%,#f0eeea 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.more{display:block;margin:20px auto 80px;padding:10px 28px;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--mute);font-size:12px;cursor:pointer;font-family:inherit}
.prow{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.prov{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--line);cursor:pointer;text-decoration:none;color:var(--ink);font-size:11px}
.prov img{width:20px;height:20px;border-radius:3px}
.gtag{font-size:10px;padding:3px 10px;border-radius:18px;display:inline-block;margin:0 3px 3px 0;background:var(--surface);border:1px solid var(--line);color:var(--mute)}
.confetti{position:fixed;top:-10px;z-index:999;pointer-events:none;animation:confetti-fall 3s linear forwards}
.rlinks{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.rlinks a{font-size:10px;color:var(--mute);text-decoration:none;padding:3px 9px;border:1px solid var(--line);border-radius:6px}
.booknote{margin-top:10px;padding:10px 14px;background:var(--surface);border-radius:8px;border:1px solid var(--line);font-size:12px;color:var(--mute)}
.booknote strong{color:var(--ink)}

/* Timer pressure screen */
.pressure-screen{position:fixed;inset:0;z-index:300;background:#0a0a0f;display:flex;align-items:center;justify-content:center;animation:fadeIn .5s}
.pressure-timer{font-family:'Instrument Serif',serif;font-size:140px;font-weight:400;color:var(--gold);text-shadow:0 0 60px rgba(196,162,101,.3);animation:tickPulse 1s infinite}
@media(max-width:500px){.pressure-timer{font-size:96px}}
</style>
</head>
<body>

<div id="app"></div>

<script>
var PROXY='/.netlify/functions/tmdb',IMG='https://image.tmdb.org/t/p';
var GENRES=[{id:28,s:'action',l:'Action'},{id:16,s:'animation',l:'Animation'},{id:35,s:'comedy',l:'Comedy'},{id:99,s:'documentary',l:'Docs'},{id:18,s:'drama',l:'Drama'},{id:14,s:'fantasy',l:'Fantasy'},{id:27,s:'horror',l:'Horror'},{id:10749,s:'romance',l:'Romance'},{id:878,s:'scifi',l:'Sci-Fi'},{id:53,s:'thriller',l:'Thriller'},{id:80,s:'crime',l:'Crime'},{id:10751,s:'family',l:'Family'},{id:12,s:'adventure',l:'Adventure'},{id:9648,s:'mystery',l:'Mystery'}];
var MOODS=[{id:'date',l:'Date Night',g:[10749,35,18]},{id:'partner',l:'With Partner',g:[35,53,28]},{id:'learn',l:'Learn',g:[99,36,18]},{id:'nostalgia',l:'Nostalgic',g:[35,10751,16]},{id:'suspense',l:'Suspense',g:[28,53,80]},{id:'chill',l:'Chill',g:[35,16,10402]},{id:'family',l:'Family Night',g:[16,10751,12]},{id:'solo',l:'Solo Binge',g:[878,53,9648]}];
var TABS=[{id:'trending',l:'Trending',ep:'/trending/all/week'},{id:'top',l:'Best Rated',ep:'/movie/top_rated',also:'/tv/top_rated'},{id:'popular',l:'Popular',ep:'/movie/popular',also:'/tv/popular'},{id:'sub',l:'Subscription',ep:'/discover/movie',also:'/discover/tv',extra:{with_watch_monetization_types:'flatrate',watch_region:'US',sort_by:'popularity.desc'}},{id:'rental',l:'Rental',ep:'/discover/movie',also:'/discover/tv',extra:{with_watch_monetization_types:'rent',watch_region:'US',sort_by:'popularity.desc'}},{id:'free',l:'Free',ep:'/discover/movie',also:'/discover/tv',extra:{with_watch_monetization_types:'free',watch_region:'US',sort_by:'popularity.desc'}},{id:'upcoming',l:'Coming Soon',ep:'/movie/upcoming'},{id:'tv',l:'Top TV',ep:'/tv/top_rated'},{id:'tvtrend',l:'TV Trending',ep:'/trending/tv/week'}];
var SU={'Netflix':'https://www.netflix.com','Hulu':'https://www.hulu.com','Prime Video':'https://www.amazon.com/gp/video','Disney+':'https://www.disneyplus.com','Disney Plus':'https://www.disneyplus.com','Max':'https://www.max.com','Apple TV+':'https://tv.apple.com','Apple TV Plus':'https://tv.apple.com','Peacock':'https://www.peacocktv.com','Peacock Premium':'https://www.peacocktv.com','Paramount+':'https://www.paramountplus.com','Paramount Plus':'https://www.paramountplus.com','Tubi':'https://tubitv.com','MUBI':'https://mubi.com','Crunchyroll':'https://www.crunchyroll.com'};
var BOOKS={'872585':'American Prometheus by Kai Bird','438631':'Dune by Frank Herbert','693134':'Dune by Frank Herbert','466420':'Killers of the Flower Moon by David Grann','278':'Rita Hayworth and Shawshank Redemption by Stephen King','238':'The Godfather by Mario Puzo','120':'The Lord of the Rings by J.R.R. Tolkien','550':'Fight Club by Chuck Palahniuk','497':'The Green Mile by Stephen King','157336':'Interstellar by J. & C. Nolan (screenplay)'};
var BRECS={28:'The Bourne Identity by Robert Ludlum',878:'Dune by Frank Herbert',27:'The Shining by Stephen King',53:'Gone Girl by Gillian Flynn',18:'A Little Life by Hanya Yanagihara',35:'Catch-22 by Joseph Heller',10749:'Normal People by Sally Rooney',14:'The Name of the Wind by Patrick Rothfuss',16:'The House in the Cerulean Sea by TJ Klune',80:'In Cold Blood by Truman Capote',99:'Sapiens by Yuval Noah Harari',12:'Into the Wild by Jon Krakauer',10751:'Wonder by R.J. Palacio',9648:'And Then There Were None by Agatha Christie'};

// State
var S={movies:[],loading:false,err:null,page:1,tp:1,genres:[],moods:[],q:'',tab:'trending',mode:'tab',
  sel:null,trail:null,provs:[],aiLoading:false,
  wheel:[null,null,null],view:'wheel', // wheel | browse
  result:null,resultTrail:null,resultProvs:[],
  timer:null,bookRec:null,pressure:false};

// Streak
var streak={count:0,lastDate:''};
try{var sd=JSON.parse(localStorage.getItem('rs_streak')||'{}');streak.count=sd.count||0;streak.lastDate=sd.lastDate||''}catch(e){}
function updateStreak(){
  var today=new Date().toISOString().slice(0,10);
  if(streak.lastDate===today)return;
  var yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);
  if(streak.lastDate===yesterday){streak.count++;streak.lastDate=today}
  else{streak.count=1;streak.lastDate=today}
  try{localStorage.setItem('rs_streak',JSON.stringify(streak))}catch(e){}
}

// Spin tracking
var spinCount=0,resultOpenedAt=null,spinHistory=[],bookDismissCount=0;

// Touch spin
var touchStartAngle=null,currentRotation=0,isSpinning=false,spinVelocity=0;

function api(path,params){var qs='path='+encodeURIComponent(path);if(params)Object.keys(params).forEach(function(k){qs+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k])});return fetch(PROXY+'?'+qs).then(function(r){if(!r.ok)throw new Error('API '+r.status);return r.json()})}
function pk(m){return{id:m.id,t:m.title||m.name||'',y:(m.release_date||m.first_air_date||'').slice(0,4),gi:m.genre_ids||[],v:m.vote_average||0,o:m.overview||'',mt:m.media_type||'movie',img:m.poster_path?IMG+'/w342'+m.poster_path:null,bg:m.backdrop_path?IMG+'/w780'+m.backdrop_path:null}}

async function load(pg){
  pg=pg||1;S.loading=true;S.err=null;draw();
  try{var d;
    if(S.mode==='search'&&S.q){d=await api('/search/multi',{query:S.q,page:pg,include_adult:false});d.results=(d.results||[]).filter(function(r){return r.media_type==='movie'||r.media_type==='tv'})}
    else if(S.mode==='genre'){
      var ids=S.genres.map(function(s){var g=GENRES.find(function(x){return x.s===s});return g?g.id:null}).filter(Boolean).join(',');
      var both=await Promise.all([api('/discover/movie',{with_genres:ids,sort_by:'popularity.desc','vote_count.gte':'10',page:pg}),api('/discover/tv',{with_genres:ids,sort_by:'popularity.desc','vote_count.gte':'10',page:pg})]);
      var mr=(both[0].results||[]).map(function(m){m.media_type='movie';return m});var tr=(both[1].results||[]).map(function(m){m.media_type='tv';return m});
      d={results:mr.concat(tr).sort(function(a,b){return(b.popularity||0)-(a.popularity||0)}),total_pages:Math.max(both[0].total_pages||1,both[1].total_pages||1)};
    }else if(S.mode==='mood'){
      var mg=[];S.moods.forEach(function(mid){var m=MOODS.find(function(x){return x.id===mid});if(m)m.g.forEach(function(g){if(mg.indexOf(g)<0)mg.push(g)})});
      var both=await Promise.all([api('/discover/movie',{with_genres:mg.join(','),sort_by:'popularity.desc','vote_count.gte':'10',page:pg}),api('/discover/tv',{with_genres:mg.join(','),sort_by:'popularity.desc','vote_count.gte':'10',page:pg})]);
      var mr=(both[0].results||[]).map(function(m){m.media_type='movie';return m});var tr=(both[1].results||[]).map(function(m){m.media_type='tv';return m});
      d={results:mr.concat(tr).sort(function(a,b){return(b.popularity||0)-(a.popularity||0)}),total_pages:Math.max(both[0].total_pages||1,both[1].total_pages||1)};
    }else{
      var tb=TABS.find(function(t){return t.id===S.tab})||TABS[0];var params={page:pg};if(tb.extra)Object.keys(tb.extra).forEach(function(k){params[k]=tb.extra[k]});
      if(tb.also){var both=await Promise.all([api(tb.ep,params),api(tb.also,Object.assign({},params))]);var mr=(both[0].results||[]).map(function(m){if(!m.media_type)m.media_type='movie';return m});var tvr=(both[1].results||[]).map(function(m){if(!m.media_type)m.media_type='tv';return m});d={results:mr.concat(tvr).sort(function(a,b){return(b.popularity||0)-(a.popularity||0)}),total_pages:Math.max(both[0].total_pages||1,both[1].total_pages||1)}}
      else{d=await api(tb.ep,params)}
    }
    var items=(d.results||[]).filter(function(m){return m.poster_path}).map(pk);
    S.movies=pg===1?items:S.movies.concat(items);S.page=pg;S.tp=Math.min(d.total_pages||1,500);
  }catch(e){S.err=e.message&&e.message.indexOf('fetch')>=0?'Set TMDB_API_KEY in Netlify env vars & redeploy.':e.message}
  S.loading=false;draw();
}

function addW(m){for(var i=0;i<3;i++){if(S.wheel[i]&&S.wheel[i].id===m.id)return}for(var i=0;i<3;i++){if(!S.wheel[i]){S.wheel[i]=m;draw();return}}}
function rmW(i){S.wheel[i]=null;draw()}
function wc(){return S.wheel.filter(Boolean).length}
var fillCount=0;
function autoFill(){var av=S.movies.filter(function(){return true});for(var i=av.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=av[i];av[i]=av[j];av[j]=tmp}S.wheel=[av[0]||null,av[1]||null,av[2]||null];fillCount++;draw();if(fillCount>=3){fillCount=0;setTimeout(function(){showBookRec()},400)}}
function showBookRec(){var allG=[];S.wheel.forEach(function(m){if(m)(m.gi||[]).forEach(function(g){if(allG.indexOf(g)<0)allG.push(g)})});var rec=null;for(var i=0;i<allG.length;i++){if(BRECS[allG[i]]){rec=BRECS[allG[i]];break}}if(!rec)rec='Sapiens by Yuval Noah Harari';S.bookRec=rec;draw()}

function doSpin(){
  if(wc()<2||isSpinning)return;
  isSpinning=true;updateStreak();
  var filled=S.wheel.filter(Boolean);var winner=filled[Math.floor(Math.random()*filled.length)];
  // Animate rotation
  var targetRot=currentRotation+1080+Math.random()*720;
  var startRot=currentRotation;var startTime=Date.now();var duration=3500;
  function animate(){
    var elapsed=Date.now()-startTime;var t=Math.min(1,elapsed/duration);
    var ease=1-Math.pow(1-t,4); // ease out quart
    currentRotation=startRot+(targetRot-startRot)*ease;
    var el=document.getElementById('lens');
    if(el)el.style.transform='rotate('+currentRotation+'deg)';
    if(t<1){requestAnimationFrame(animate)}
    else{isSpinning=false;S.result=winner;S.resultTrail=null;S.resultProvs=[];resultOpenedAt=Date.now();draw();loadRD(winner);spawnConfetti()}
  }
  animate();
}

var pressureInt=null;var pressureAudio=null;
function startPressureTimer(){
  // Play classical tick-tock feeling music using Web Audio
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    // Create a ticking classical feel with oscillators
    function playTick(time,freq,dur){
      var o=ac.createOscillator();var g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0.15,time);
      g.gain.exponentialRampToValueAtTime(0.001,time+dur);
      o.start(time);o.stop(time+dur);
    }
    // Schedule ticking notes — escalating tension
    var now=ac.currentTime;
    for(var i=0;i<60;i++){
      var t=now+i;
      var baseFreq=220+i*3; // gradually rising pitch = tension
      playTick(t,baseFreq,0.3);
      playTick(t+0.5,baseFreq*1.5,0.15); // off-beat tick
      if(i>30)playTick(t+0.25,baseFreq*1.25,0.1); // faster after 30s
      if(i>45){playTick(t+0.125,baseFreq*1.75,0.08);playTick(t+0.375,baseFreq*0.75,0.08)} // frantic
    }
    pressureAudio=ac;
  }catch(e){}
  pressureInt=setInterval(function(){
    S.timer--;draw();
    if(S.timer<=0){clearInterval(pressureInt);S.pressure=false;S.timer=null;if(pressureAudio)try{pressureAudio.close()}catch(e){}draw()}
  },1000);
}
function stopPressure(){clearInterval(pressureInt);S.pressure=false;S.timer=null;if(pressureAudio)try{pressureAudio.close()}catch(e){}bookDismissCount=0;draw()}

function cPts(i,n){var d=360/n,s=i*d-90,e=s+d,pts=[];for(var a=s;a<=e;a+=3){var r=a*Math.PI/180;pts.push((50+48*Math.cos(r)).toFixed(1)+'% '+(50+48*Math.sin(r)).toFixed(1)+'%')}return pts.join(',')}

// Touch spin
function attachTouch(){
  var el=document.getElementById('lens');if(!el||el._touchAttached)return;el._touchAttached=true;
  var rect,cx,cy,lastAngle,lastTime,vel;
  function getAngle(x,y){return Math.atan2(y-cy,x-cx)*180/Math.PI}
  el.addEventListener('touchstart',function(e){
    if(isSpinning||wc()<2)return;
    e.preventDefault();rect=el.getBoundingClientRect();cx=rect.left+rect.width/2;cy=rect.top+rect.height/2;
    var t=e.touches[0];lastAngle=getAngle(t.clientX,t.clientY);lastTime=Date.now();vel=0;
  },{passive:false});
  el.addEventListener('touchmove',function(e){
    if(isSpinning||!lastAngle)return;e.preventDefault();
    var t=e.touches[0];var angle=getAngle(t.clientX,t.clientY);var delta=angle-lastAngle;
    if(delta>180)delta-=360;if(delta<-180)delta+=360;
    currentRotation+=delta;el.style.transform='rotate('+currentRotation+'deg)';
    var now=Date.now();vel=delta/(now-lastTime+1)*16;lastAngle=angle;lastTime=now;
  },{passive:false});
  el.addEventListener('touchend',function(e){
    if(isSpinning||wc()<2)return;
    if(Math.abs(vel)>2){doSpin()}// Flick detected
    lastAngle=null;
  });
  // Mouse support for desktop
  var mouseDown=false;
  el.addEventListener('mousedown',function(e){
    if(isSpinning||wc()<2)return;
    rect=el.getBoundingClientRect();cx=rect.left+rect.width/2;cy=rect.top+rect.height/2;
    lastAngle=getAngle(e.clientX,e.clientY);lastTime=Date.now();vel=0;mouseDown=true;
  });
  window.addEventListener('mousemove',function(e){
    if(!mouseDown||isSpinning)return;
    var angle=getAngle(e.clientX,e.clientY);var delta=angle-lastAngle;
    if(delta>180)delta-=360;if(delta<-180)delta+=360;
    currentRotation+=delta;el.style.transform='rotate('+currentRotation+'deg)';
    var now=Date.now();vel=delta/(now-lastTime+1)*16;lastAngle=angle;lastTime=now;
  });
  window.addEventListener('mouseup',function(){
    if(!mouseDown)return;mouseDown=false;
    if(Math.abs(vel)>2&&wc()>=2&&!isSpinning)doSpin();
    lastAngle=null;
  });
  // Swipe up to browse
  var sy=null;
  document.querySelector('.wheel-screen').addEventListener('touchstart',function(e){sy=e.touches[0].clientY},{passive:true});
  document.querySelector('.wheel-screen').addEventListener('touchend',function(e){
    if(sy!==null&&sy-e.changedTouches[0].clientY>60)goTo('browse');
    sy=null;
  },{passive:true});
  // Swipe down to go back to wheel
  var browseEl=document.querySelector('.browse-screen');
  if(browseEl){
    var bsy=null;
    browseEl.addEventListener('touchstart',function(e){bsy=e.touches[0].clientY},{passive:true});
    browseEl.addEventListener('touchend',function(e){
      if(bsy!==null&&e.changedTouches[0].clientY-bsy>60&&browseEl.scrollTop<10)goTo('wheel');
      bsy=null;
    },{passive:true});
  }
}

function drawTimer(){
  if(S.timer===null||S.pressure)return'';
  var m=Math.floor(S.timer/60),s=S.timer%60;
  return'<div class="ov ov-light" onclick="stopTimer()"><div style="text-align:center"><p style="font-family:Instrument Serif,serif;font-size:18px;color:var(--mute);font-style:italic;margin-bottom:16px">Take a moment...</p><div style="font-family:Instrument Serif,serif;font-size:120px;color:var(--ink);animation:tickPulse 1s infinite">'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'</div><p style="font-size:12px;color:var(--dim);margin-top:12px">tap to dismiss</p></div></div>';
}

function drawBookRec(){
  if(!S.bookRec)return'';
  return'<div class="ov ov-light" onclick="closeBook()"><div class="modal-card" onclick="event.stopPropagation()" style="text-align:center;padding:36px 28px"><div style="font-size:48px;margin-bottom:14px">📖</div><p style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:6px">Book Recommendation</p><p style="font-family:Instrument Serif,serif;font-size:18px;font-style:italic;line-height:1.5;color:#555;margin-bottom:20px">'+S.bookRec+'</p><div style="display:flex;gap:8px;justify-content:center"><a href="https://www.goodreads.com/search?q='+encodeURIComponent((S.bookRec.match(/:\s*(.+?)(?:\s*—|$)/)||['','book'])[1])+'" target="_blank" style="padding:10px 22px;border-radius:8px;background:var(--ink);color:#fff;font-size:12px;font-weight:600;text-decoration:none">Find on Goodreads</a><button onclick="closeBook()" style="padding:10px 22px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--mute);font-size:12px;cursor:pointer;font-family:inherit">Dismiss</button></div></div></div>';
}

function drawPressure(){
  if(!S.pressure||S.timer===null)return'';
  var m=Math.floor(S.timer/60),s=S.timer%60;
  return'<div class="pressure-screen" onclick="stopPressure()"><div style="text-align:center"><p style="font-family:Instrument Serif,serif;font-size:16px;color:#555;font-style:italic;margin-bottom:20px;letter-spacing:1px">Time is ticking...</p><div class="pressure-timer">'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'</div><p style="font-size:18px;color:var(--gold);margin-top:20px;font-family:Instrument Serif,serif;font-style:italic">Just pick something already.</p><p style="font-size:11px;color:#444;margin-top:24px">tap to escape</p></div></div>';
}

function drawModal(){
  if(!S.sel)return'';var m=S.sel;
  var tr=S.trail?'<div style="position:relative;width:100%;aspect-ratio:16/9;border-radius:14px 14px 0 0;overflow:hidden;background:#111"><iframe src="https://www.youtube.com/embed/'+S.trail+'?autoplay=1&rel=0&modestbranding=1" allow="autoplay;encrypted-media" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none"></iframe><button class="close-btn" onclick="clsM()">✕</button></div>':'<div style="position:relative;width:100%;aspect-ratio:16/9;border-radius:14px 14px 0 0;overflow:hidden;background:var(--surface)">'+(m.bg?'<img src="'+m.bg+'" style="width:100%;height:100%;object-fit:cover">':'')+'<button class="close-btn" onclick="clsM()">✕</button></div>';
  var gt=m.gi.map(function(gid){var ge=GENRES.find(function(x){return x.id===gid});return ge?'<span class="gtag">'+ge.l+'</span>':''}).join('');
  var provH=S.provs.length?'<p style="font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:2px;margin:12px 0 6px">Watch On</p><div class="prow">'+S.provs.map(function(p){var url=SU[p.n]||'#';return'<a href="'+url+'" target="_blank" rel="noopener" class="prov"><img src="'+p.l+'" onerror="this.style.display=\'none\'"><span>'+p.n+'</span></a>'}).join('')+'</div>':'';
  var inW=S.wheel.some(function(w){return w&&w.id===m.id});
  var bk=BOOKS[m.id]?'<div class="booknote">📖 <strong>'+BOOKS[m.id]+'</strong></div>':'';
  return'<div class="ov ov-light" onclick="clsM()"><div class="modal-card" onclick="event.stopPropagation()">'+tr+'<div style="padding:18px 22px 24px"><h2 style="font-family:Instrument Serif,serif;font-size:24px;margin-bottom:3px">'+m.t+'</h2><p style="font-size:11px;color:var(--mute);margin-bottom:10px">'+m.y+(m.mt==='tv'?' · TV':'')+'</p><p style="font-size:12px;line-height:1.7;color:#666;margin-bottom:10px">'+m.o+'</p><div style="margin-bottom:6px">'+gt+'</div><div class="rlinks"><span style="font-size:13px;font-weight:700">★'+m.v.toFixed(1)+'</span><a href="https://www.imdb.com/find/?q='+encodeURIComponent(m.t)+'" target="_blank">IMDb</a><a href="https://www.rottentomatoes.com/search?search='+encodeURIComponent(m.t)+'" target="_blank">RT</a></div>'+provH+bk+'<button onclick="addW(S.sel);clsM()" style="margin-top:14px;padding:10px 22px;border-radius:8px;background:'+(inW?'var(--gold)':'var(--ink)')+';border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;width:100%">'+(inW?'✓ On Wheel':'+ Add to Wheel')+'</button></div></div></div>';
}

// Init
load(); draw();
</script>
</body>
</html>
