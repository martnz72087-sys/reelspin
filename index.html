<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelSpin — Spin to Watch</title>
<meta name="description" content="Can't decide what to watch? Add up to 3, spin the lens, let fate decide.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafaf8;--ink:#111;--mute:#888;--dim:#bbb;--line:#e8e6e2;--card:#fff;--accent:#111;--accent2:#c4a265;--surface:#f2f0ec}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Figtree',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes lensRotate{from{transform:rotate(0deg)}to{transform:rotate(1080deg)}}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes tickPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(250,250,248,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.hdr{max-width:1200px;margin:0 auto;padding:14px 24px}
.logo{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;letter-spacing:-.5px;color:var(--ink)}
.logo em{font-style:italic;color:var(--accent2)}

/* Search */
.sbox{flex:1;min-width:180px;position:relative}
.sbox input{width:100%;padding:10px 80px 10px 38px;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.sbox input:focus{border-color:var(--ink)}
.sbox input::placeholder{color:var(--dim)}
.sbtn{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:var(--ink);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:10px;cursor:pointer;font-weight:600;font-family:inherit;letter-spacing:.5px;text-transform:uppercase}

/* Chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.chips::-webkit-scrollbar{height:2px}
.chip{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;user-select:none;flex-shrink:0;background:transparent;border:1px solid var(--line);color:var(--mute)}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;font-size:12px;font-weight:500;color:var(--mute);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;letter-spacing:.3px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:700}

/* Grid */
.grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}}
.card{border-radius:6px;overflow:hidden;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:all .2s ease;animation:slideUp .35s ease both;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.1);border-color:var(--dim)}
.card .poster{aspect-ratio:2/3;overflow:hidden;background:var(--surface);position:relative}
.card .poster img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .poster img{transform:scale(1.04)}
.card .info{padding:10px 12px}
.card .info h3{font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .info p{font-size:10px;color:var(--mute);margin-top:3px}
.rating-badge{position:absolute;bottom:8px;left:8px;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.8);color:#fff;font-size:10px;font-weight:700;letter-spacing:.3px}
.add-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:var(--ink);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0;z-index:3;font-family:inherit}
.card:hover .add-btn{opacity:1}
.add-btn:hover{transform:scale(1.12);background:var(--accent2)}
.add-btn.added{background:var(--accent2);opacity:1}

/* Wheel Section — bigger, more prominent */
.wheel-section{position:fixed;bottom:0;left:0;right:0;z-index:40}
.wheel-bar{background:rgba(255,255,255,.98);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:18px 24px;box-shadow:0 -8px 30px rgba(0,0,0,.06)}
.wheel-bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.wheel-slot{width:64px;height:96px;border-radius:6px;border:2px dashed var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;transition:all .2s;background:var(--surface)}
.wheel-slot.filled{border-style:solid;border-color:var(--ink)}
.wheel-slot img{width:100%;height:100%;object-fit:cover;border-radius:4px}
.wheel-slot .remove{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #fff;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.wheel-slot .remove:hover{background:#c00;transform:scale(1.1)}
.spin-btn{padding:14px 36px;border-radius:8px;background:var(--ink);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Instrument Serif',serif;font-style:italic;letter-spacing:.5px;transition:all .2s}
.spin-btn:hover{background:#333;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.spin-btn:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none}
.auto-fill-btn{padding:10px 18px;border-radius:8px;background:var(--surface);border:1px solid var(--line);color:var(--mute);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.auto-fill-btn:hover{border-color:var(--ink);color:var(--ink)}

/* Lens Wheel Overlay */
.wheel-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s}
.lens{width:300px;height:300px;border-radius:50%;border:3px solid #333;position:relative;animation:lensRotate 3s cubic-bezier(.2,.8,.3,1) forwards;overflow:hidden}
.lens-ring{position:absolute;inset:8px;border-radius:50%;border:2px solid #444}
.lens-ring2{position:absolute;inset:20px;border-radius:50%;border:1px solid #555}
.lens-ring3{position:absolute;inset:40px;border-radius:50%;border:1px solid #666;display:flex;align-items:center;justify-content:center}
.lens-blade{position:absolute;width:100%;height:100%;top:0;left:0}

/* Result */
.result-overlay{position:fixed;inset:0;z-index:250;background:rgba(250,250,248,.98);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s}
.result-card{background:#fff;border-radius:12px;max-width:600px;width:94%;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.1);animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
.result-trailer{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:12px 12px 0 0;background:#111}
.result-trailer iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.result-body{padding:24px 28px 30px}
.result-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.result-actions button,.result-actions a{padding:11px 22px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line)}

/* Timer */
.timer-overlay{position:fixed;inset:0;z-index:260;background:rgba(250,250,248,.98);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.timer-num{font-family:'Instrument Serif',serif;font-size:120px;font-weight:400;color:var(--ink);line-height:1;animation:tickPulse 1s infinite}

/* Detail Modal */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);animation:fadeIn .2s}
.modal{background:#fff;border-radius:12px;max-width:640px;width:94%;max-height:90vh;overflow-y:auto;border:1px solid var(--line);box-shadow:0 24px 80px rgba(0,0,0,.15);animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
.mcls{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(0,0,0,.6);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:5}

.shim{background:linear-gradient(90deg,#f0eeea 25%,#e8e6e2 50%,#f0eeea 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.more{display:block;margin:30px auto 120px;padding:11px 30px;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--mute);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
.more:hover{border-color:var(--ink);color:var(--ink)}
.prow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.prov{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--line);cursor:pointer;text-decoration:none;transition:all .15s;color:var(--ink)}
.prov:hover{border-color:var(--ink)}
.prov img{width:22px;height:22px;border-radius:4px}
.prov span{font-size:12px;font-weight:500}
.gtag{font-size:10px;padding:4px 12px;border-radius:20px;display:inline-block;margin:0 4px 4px 0;background:var(--surface);border:1px solid var(--line);color:var(--mute)}
.err{padding:12px 18px;border-radius:8px;background:#fff5f5;border:1px solid #fdd;margin-bottom:14px}
.err p{font-size:12px;color:#c00}
.confetti{position:fixed;top:-10px;z-index:300;pointer-events:none;animation:confetti-fall 3s linear forwards}
.section-label{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;margin-bottom:16px;color:var(--ink);letter-spacing:-.3px}
.rating-links{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.rating-links a{font-size:11px;color:var(--mute);text-decoration:none;padding:4px 10px;border:1px solid var(--line);border-radius:6px;transition:all .15s}
.rating-links a:hover{border-color:var(--ink);color:var(--ink)}
.book-note{margin-top:12px;padding:10px 14px;background:var(--surface);border-radius:8px;border:1px solid var(--line);font-size:12px;color:var(--mute)}
.book-note strong{color:var(--ink)}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PROXY='/.netlify/functions/tmdb';
var IMG='https://image.tmdb.org/t/p';

var GENRES=[
{id:28,s:'action',l:'Action',c:'#444'},{id:16,s:'animation',l:'Animation',c:'#444'},
{id:35,s:'comedy',l:'Comedy',c:'#444'},{id:99,s:'documentary',l:'Documentary',c:'#444'},
{id:18,s:'drama',l:'Drama',c:'#444'},{id:14,s:'fantasy',l:'Fantasy',c:'#444'},
{id:27,s:'horror',l:'Horror',c:'#444'},{id:10749,s:'romance',l:'Romance',c:'#444'},
{id:878,s:'scifi',l:'Sci-Fi',c:'#444'},{id:53,s:'thriller',l:'Thriller',c:'#444'},
{id:80,s:'crime',l:'Crime',c:'#444'},{id:10751,s:'family',l:'Family',c:'#444'},
{id:12,s:'adventure',l:'Adventure',c:'#444'},{id:9648,s:'mystery',l:'Mystery',c:'#444'}];

var MOODS=[
{id:'date',l:'Date Night',c:'#444',g:[10749,35,18]},
{id:'partner',l:'With Partner',c:'#444',g:[35,53,28]},
{id:'learn',l:'Learn Something',c:'#444',g:[99,36,18]},
{id:'nostalgia',l:'Nostalgic',c:'#444',g:[35,10751,16]},
{id:'suspense',l:'Suspense',c:'#444',g:[28,53,80]},
{id:'chill',l:'Chill',c:'#444',g:[35,16,10402]},
{id:'family',l:'Family Night',c:'#444',g:[16,10751,12]},
{id:'solo',l:'Solo Binge',c:'#444',g:[878,53,9648]}];

var TABS=[
{id:'trending',l:'Trending Now',ep:'/trending/all/week'},
{id:'top',l:'Best Rated',ep:'/movie/top_rated'},
{id:'popular',l:'Most Popular',ep:'/movie/popular'},
{id:'now',l:'In Theaters',ep:'/movie/now_playing'},
{id:'upcoming',l:'Coming Soon',ep:'/movie/upcoming'},
{id:'tv',l:'Top TV',ep:'/tv/top_rated'},
{id:'tvtrend',l:'TV Trending',ep:'/trending/tv/week'}];

var STREAM_URLS={
'Netflix':'https://www.netflix.com','Hulu':'https://www.hulu.com','Prime Video':'https://www.amazon.com/gp/video',
'Disney Plus':'https://www.disneyplus.com','Disney+':'https://www.disneyplus.com','Max':'https://www.max.com',
'Apple TV Plus':'https://tv.apple.com','Apple TV+':'https://tv.apple.com',
'Peacock':'https://www.peacocktv.com','Peacock Premium':'https://www.peacocktv.com',
'Paramount Plus':'https://www.paramountplus.com','Paramount+':'https://www.paramountplus.com',
'fuboTV':'https://www.fubo.tv','Tubi':'https://tubitv.com','MUBI':'https://mubi.com',
'Crunchyroll':'https://www.crunchyroll.com','Shudder':'https://www.shudder.com'};

// Books associated with well-known films (subset)
var BOOKS={'11':'Alice in Wonderland by Lewis Carroll','278':'Rita Hayworth and Shawshank Redemption by Stephen King','238':'The Godfather by Mario Puzo','155':'The Dark Knight Returns by Frank Miller','680':'Pulp Fiction (original screenplay by Quentin Tarantino)','13':'Forrest Gump by Winston Groom','120':'The Lord of the Rings by J.R.R. Tolkien','121':'The Two Towers by J.R.R. Tolkien','122':'The Return of the King by J.R.R. Tolkien','550':'Fight Club by Chuck Palahniuk','807':'Se7en (original screenplay by Andrew Kevin Walker)','424':'Schindler\'s List by Thomas Keneally','27205':'Inception (original screenplay by Christopher Nolan)','157336':'Interstellar (original screenplay by Jonathan & Christopher Nolan)','19404':'Dilwale Dulhania Le Jayenge','497':'The Green Mile by Stephen King','372058':'Your Name (novel by Makoto Shinkai)','637':'Life is Beautiful','389':'12 Angry Men','429':'The Good, The Bad and The Ugly','346':'Seven Samurai','769':'GoodFellas by Nicholas Pileggi','429617':'Spider-Man: Far From Home','299536':'Avengers: Infinity War','299534':'Avengers: Endgame','667257':'Shōgun by James Clavell','872585':'American Prometheus by Kai Bird & Martin J. Sherwin','438631':'Dune by Frank Herbert','693134':'Dune: Part Two — Dune by Frank Herbert','466420':'Killers of the Flower Moon by David Grann','346698':'Barbie','569094':'Spider-Man: Across the Spider-Verse','940551':'Migration','786892':'Furiosa','823464':'Godzilla x Kong','653346':'Kingdom of the Planet of the Apes','150540':'Inside Out','1022789':'Inside Out 2'};

var S={movies:[],loading:false,err:null,page:1,tp:1,genres:[],moods:[],q:'',tab:'trending',mode:'tab',
  sel:null,trail:null,provs:[],
  wheel:[null,null,null],spinning:false,spinOverlay:false,result:null,resultTrail:null,resultProvs:[],
  timer:null};

function api(path,params){
  var qs='path='+encodeURIComponent(path);
  if(params)Object.keys(params).forEach(function(k){qs+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k])});
  return fetch(PROXY+'?'+qs).then(function(r){if(!r.ok)throw new Error('API '+r.status);return r.json()});
}
function pk(m){return{id:m.id,t:m.title||m.name||'',y:(m.release_date||m.first_air_date||'').slice(0,4),gi:m.genre_ids||[],v:m.vote_average||0,o:m.overview||'',mt:m.media_type||'movie',img:m.poster_path?IMG+'/w342'+m.poster_path:null,bg:m.backdrop_path?IMG+'/w780'+m.backdrop_path:null}}

async function load(pg){
  pg=pg||1;S.loading=true;S.err=null;draw();
  try{var d;
    if(S.mode==='search'&&S.q){d=await api('/search/multi',{query:S.q,page:pg,include_adult:false});d.results=(d.results||[]).filter(function(r){return r.media_type==='movie'||r.media_type==='tv'})}
    else if(S.mode==='genre'){var ids=S.genres.map(function(s){var g=GENRES.find(function(x){return x.s===s});return g?g.id:null}).filter(Boolean).join(',');d=await api('/discover/movie',{with_genres:ids,sort_by:'popularity.desc','vote_count.gte':'20',page:pg})}
    else if(S.mode==='mood'){var mg=[];S.moods.forEach(function(mid){var m=MOODS.find(function(x){return x.id===mid});if(m)m.g.forEach(function(g){if(mg.indexOf(g)<0)mg.push(g)})});d=await api('/discover/movie',{with_genres:mg.join(','),sort_by:'popularity.desc','vote_count.gte':'20',page:pg})}
    else{var tb=TABS.find(function(t){return t.id===S.tab})||TABS[0];d=await api(tb.ep,{page:pg})}
    var items=(d.results||[]).filter(function(m){return m.poster_path}).map(pk);
    S.movies=pg===1?items:S.movies.concat(items);S.page=pg;S.tp=Math.min(d.total_pages||1,500);
  }catch(e){S.err=e.message&&e.message.indexOf('fetch')>=0?'Cannot reach API — check Netlify env var TMDB_API_KEY and redeploy.':e.message}
  S.loading=false;draw();
}

function addW(movie){for(var i=0;i<3;i++){if(S.wheel[i]&&S.wheel[i].id===movie.id)return}for(var i=0;i<3;i++){if(!S.wheel[i]){S.wheel[i]=movie;draw();return}}}
function rmW(i){S.wheel[i]=null;draw()}
function wc(){return S.wheel.filter(Boolean).length}

function autoFill(){
  var av=S.movies.filter(function(m){return!S.wheel.some(function(w){return w&&w.id===m.id})});
  for(var i=0;i<3;i++){if(!S.wheel[i]&&av.length){var ri=Math.floor(Math.random()*av.length);S.wheel[i]=av.splice(ri,1)[0]}}
  draw();
}

function startSpin(){
  if(wc()<2)return;S.spinning=true;S.spinOverlay=true;S.result=null;draw();
  var filled=S.wheel.filter(Boolean);var winner=filled[Math.floor(Math.random()*filled.length)];
  setTimeout(function(){S.spinning=false;S.spinOverlay=false;S.result=winner;S.resultTrail=null;S.resultProvs=[];draw();loadRD(winner);spawnConfetti()},3500);
}
async function loadRD(m){
  try{var tp=m.mt==='tv'?'tv':'movie';var res=await Promise.all([api('/'+tp+'/'+m.id+'/videos'),api('/'+tp+'/'+m.id+'/watch/providers')]);
    var vid=(res[0].results||[]).find(function(v){return v.type==='Trailer'&&v.site==='YouTube'})||(res[0].results||[]).find(function(v){return v.site==='YouTube'});S.resultTrail=vid?vid.key:null;
    var us=res[1].results?res[1].results.US:null;if(us){var all=(us.flatrate||[]).concat(us.ads||[]).concat(us.free||[]);var sn={};S.resultProvs=all.filter(function(p){if(sn[p.provider_id])return false;sn[p.provider_id]=true;return true}).slice(0,8).map(function(p){return{n:p.provider_name,l:IMG+'/w45'+p.logo_path}})}
  }catch(e){}draw();
}
function spawnConfetti(){var colors=['#111','#c4a265','#888','#333','#ddd'];for(var i=0;i<30;i++){var el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'%';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=(5+Math.random()*7)+'px';el.style.height=(5+Math.random()*7)+'px';el.style.borderRadius=Math.random()>.5?'50%':'1px';el.style.animationDuration=(2.5+Math.random()*2)+'s';el.style.animationDelay=(Math.random()*.4)+'s';document.body.appendChild(el);setTimeout(function(e){e.remove()}.bind(null,el),5000)}}
function reSpin(){S.result=null;S.resultTrail=null;S.resultProvs=[];startSpin()}
var timerInt=null;
function startTimer(){S.timer=60;S.result=null;draw();timerInt=setInterval(function(){S.timer--;draw();if(S.timer<=0){clearInterval(timerInt);S.timer=null;draw()}},1000)}
function stopTimer(){clearInterval(timerInt);S.timer=null;draw()}

async function openD(id){
  var m=S.movies.find(function(x){return x.id===id});if(!m)return;S.sel=m;S.trail=null;S.provs=[];draw();
  try{var tp=m.mt==='tv'?'tv':'movie';var res=await Promise.all([api('/'+tp+'/'+m.id+'/videos'),api('/'+tp+'/'+m.id+'/watch/providers')]);
    var vid=(res[0].results||[]).find(function(v){return v.type==='Trailer'&&v.site==='YouTube'})||(res[0].results||[]).find(function(v){return v.site==='YouTube'});S.trail=vid?vid.key:null;
    var us=res[1].results?res[1].results.US:null;if(us){var all=(us.flatrate||[]).concat(us.ads||[]).concat(us.free||[]);var sn={};S.provs=all.filter(function(p){if(sn[p.provider_id])return false;sn[p.provider_id]=true;return true}).slice(0,8).map(function(p){return{n:p.provider_name,l:IMG+'/w45'+p.logo_path}})}
  }catch(e){}draw();
}

// ─── DRAW ─────────────────────────
function draw(){
  var a=document.getElementById('app');
  var gc=GENRES.map(function(g){var on=S.genres.indexOf(g.s)>=0;return'<div class="chip'+(on?' on':'')+'" onclick="tgG(\''+g.s+'\')">'+g.l+'</div>'}).join('');
  var mc=MOODS.map(function(m){var on=S.moods.indexOf(m.id)>=0;return'<div class="chip'+(on?' on':'')+'" onclick="tgM(\''+m.id+'\')">'+m.l+'</div>'}).join('');
  var cl=(S.genres.length||S.moods.length||S.q)?'<button onclick="clr()" style="padding:5px 12px;border-radius:6px;font-size:10px;background:transparent;border:1px solid var(--line);color:var(--mute);cursor:pointer;font-family:inherit">Clear</button>':'';
  var si=S.q?'<button class="sbtn" onclick="doS()">Search</button>':'';
  var tbs=TABS.map(function(t){return'<button class="tab'+(S.tab===t.id&&S.mode==='tab'?' on':'')+'" onclick="stab(\''+t.id+'\')">'+t.l+'</button>'}).join('');

  var gh='';
  if(S.loading&&!S.movies.length){gh='<div class="grid">'+Array.from({length:20}).map(function(_,i){return'<div class="shim" style="aspect-ratio:2/3;animation-delay:'+i*25+'ms"></div>'}).join('')+'</div>'}
  else if(!S.movies.length&&!S.loading){gh='<div style="text-align:center;padding:60px 20px"><p style="font-family:Instrument Serif,serif;font-size:24px;color:var(--dim);font-style:italic">Nothing found</p></div>'}
  else{
    var cards=S.movies.map(function(m,i){
      var inW=S.wheel.some(function(w){return w&&w.id===m.id});
      return'<div class="card" style="animation-delay:'+i*12+'ms" onclick="openD('+m.id+')"><div class="poster">'+(m.img?'<img src="'+m.img+'" alt="'+m.t+'" loading="lazy">':'')+'<div class="rating-badge">★ '+m.v.toFixed(1)+'</div><button class="add-btn'+(inW?' added':'')+'" onclick="event.stopPropagation();addW(S.movies['+i+'])" title="Add to wheel">'+(inW?'✓':'+')+'</button></div><div class="info"><h3>'+m.t+'</h3><p>'+m.y+'</p></div></div>'}).join('');
    gh='<div class="grid">'+cards+'</div>';
    if(S.page<S.tp&&S.page<20)gh+='<button class="more" onclick="ldM()">Load More</button>';
  }

  var eh=S.err?'<div class="err"><p>'+S.err+'</p></div>':'';

  var slots=S.wheel.map(function(w,i){
    if(w)return'<div class="wheel-slot filled">'+(w.img?'<img src="'+w.img+'">':'<span>🎬</span>')+'<button class="remove" onclick="event.stopPropagation();rmW('+i+')">✕</button></div>';
    return'<div class="wheel-slot"><span style="font-size:11px;color:var(--dim)">'+(i+1)+'</span></div>';
  }).join('');
  var wn=wc();

  a.innerHTML='<header><div class="hdr">'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap">'
    +'<div class="logo">Reel<em>Spin</em></div>'
    +'<div class="sbox"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.3">🔍</span><input id="si" value="'+S.q+'" placeholder="Search any movie, show, or actor..." onkeydown="if(event.key===\'Enter\')doS()" oninput="S.q=this.value">'+si+'</div>'
    +cl+'</div>'
    +'<div class="chips" style="margin-bottom:3px">'+gc+'</div>'
    +'<div class="chips">'+mc+'</div>'
    +'</div></header>'
    +'<main style="max-width:1200px;margin:0 auto;padding:20px 24px 160px">'
    +'<div class="tabs">'+tbs+'</div>'
    +eh+gh+'</main>'
    +'<div class="wheel-section"><div class="wheel-bar"><div class="wheel-bar-inner">'
    +'<div style="display:flex;gap:10px;align-items:center">'+slots+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:180px">'
    +'<div style="display:flex;gap:10px;align-items:center">'
    +'<button class="spin-btn" onclick="startSpin()" '+(wn<2?'disabled':'')+'>Spin the Lens'+(wn<2?' — pick '+(2-wn)+' more':'')+'</button>'
    +'<button class="auto-fill-btn" onclick="autoFill()">Random Fill</button>'
    +'</div>'
    +'<p style="font-size:10px;color:var(--dim)">Add 2–3 titles, then spin</p>'
    +'</div></div></div></div>'
    +drawSpin()+drawResult()+drawTimer()+drawModal();
}

function drawSpin(){
  if(!S.spinOverlay)return'';
  var filled=S.wheel.filter(Boolean);
  var segs=filled.map(function(m,i){var colors=['#111','#222','#333'];return'<div style="position:absolute;inset:0;clip-path:polygon(50% 50%,'+(i===0?'50% 0%,100% 0%,100% 50%':i===1?'100% 50%,100% 100%,0% 100%,0% 50%':'50% 0%,0% 0%,0% 50%')+');background:'+colors[i%3]+';display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-size:11px;font-weight:600;transform:rotate('+(i*120+60)+'deg);position:absolute;top:'+(i===0?'25%':'60%')+';left:50%;transform:translateX(-50%) rotate('+(i*120)+'deg)">'+(m.t.length>14?m.t.slice(0,12)+'…':m.t)+'</span></div>'}).join('');
  return'<div class="wheel-overlay"><div style="text-align:center;animation:bounceIn .4s">'
    +'<div style="font-size:14px;color:#666;margin-bottom:16px;letter-spacing:4px;text-transform:uppercase">spinning</div>'
    +'<div class="lens">'+segs+'<div class="lens-ring"></div><div class="lens-ring2"></div><div class="lens-ring3"><div style="width:12px;height:12px;border-radius:50%;background:#fff"></div></div></div>'
    +'<p style="margin-top:20px;font-family:Instrument Serif,serif;font-size:20px;color:#888;font-style:italic">Finding your film...</p>'
    +'</div></div>';
}

function drawResult(){
  if(!S.result)return'';var m=S.result;
  var tr=S.resultTrail?'<div class="result-trailer"><iframe src="https://www.youtube.com/embed/'+S.resultTrail+'?autoplay=1&rel=0&modestbranding=1" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>':(m.bg?'<div class="result-trailer"><img src="'+m.bg+'" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="font-size:48px;opacity:.6">▶</span></div></div>':'');
  var provH=S.resultProvs.length?'<p style="font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:2px;margin:16px 0 8px">Watch On</p><div class="prow">'+S.resultProvs.map(function(p){var url=STREAM_URLS[p.n]||'#';return'<a href="'+url+'" target="_blank" rel="noopener" class="prov"><img src="'+p.l+'" alt="" onerror="this.style.display=\'none\'"><span>'+p.n+'</span></a>'}).join('')+'</div>':'';
  var gt=m.gi.map(function(gid){var ge=GENRES.find(function(x){return x.id===gid});return ge?'<span class="gtag">'+ge.l+'</span>':''}).join('');
  var bookHtml=BOOKS[m.id]?'<div class="book-note">📖 Based on: <strong>'+BOOKS[m.id]+'</strong></div>':'';
  var ratingLinks='<div class="rating-links"><span style="font-size:13px;font-weight:700;color:var(--ink)">★ '+m.v.toFixed(1)+'/10</span><a href="https://www.imdb.com/find/?q='+encodeURIComponent(m.t)+'" target="_blank">Check IMDb</a><a href="https://www.rottentomatoes.com/search?search='+encodeURIComponent(m.t)+'" target="_blank">Rotten Tomatoes</a></div>';

  return'<div class="result-overlay" onclick="closeR()"><div class="result-card" onclick="event.stopPropagation()">'+tr
    +'<div class="result-body">'
    +'<p style="font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;font-weight:600">The Lens Has Chosen</p>'
    +'<h2 style="font-family:Instrument Serif,serif;font-size:30px;font-weight:400;margin-bottom:6px">'+m.t+'</h2>'
    +'<p style="font-size:12px;color:var(--mute);margin-bottom:14px">'+m.y+'</p>'
    +'<p style="font-size:13px;line-height:1.75;color:#666;margin-bottom:14px">'+m.o+'</p>'
    +'<div style="margin-bottom:8px">'+gt+'</div>'
    +ratingLinks+provH+bookHtml
    +'<div class="result-actions">'
    +(S.resultTrail?'<a href="https://www.youtube.com/watch?v='+S.resultTrail+'" target="_blank" style="background:var(--ink);color:#fff;border-color:var(--ink)">▶ Watch Trailer</a>':'')
    +'<button onclick="reSpin()" style="background:transparent;color:var(--ink)">↻ Re-Spin</button>'
    +'<button onclick="closeR();startTimer()" style="background:transparent;color:var(--accent2);border-color:var(--accent2)">⏳ Take a Minute</button>'
    +'</div></div></div></div>';
}

function drawTimer(){
  if(S.timer===null)return'';
  var m=Math.floor(S.timer/60),s=S.timer%60;
  return'<div class="timer-overlay" onclick="stopTimer()"><div style="text-align:center">'
    +'<p style="font-family:Instrument Serif,serif;font-size:18px;color:var(--mute);font-style:italic;margin-bottom:20px">Take a moment...</p>'
    +'<div class="timer-num">'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'</div>'
    +'<p style="font-size:12px;color:var(--dim);margin-top:16px">tap anywhere to dismiss</p>'
    +'</div></div>';
}

function drawModal(){
  if(!S.sel)return'';var m=S.sel;
  var tr=S.trail?'<div style="position:relative;width:100%;aspect-ratio:16/9;border-radius:12px 12px 0 0;overflow:hidden;background:#111"><iframe src="https://www.youtube.com/embed/'+S.trail+'?autoplay=1&rel=0&modestbranding=1" allow="autoplay;encrypted-media" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none"></iframe><button class="mcls" onclick="clsM()">✕</button></div>'
    :'<div style="position:relative;width:100%;aspect-ratio:16/9;border-radius:12px 12px 0 0;overflow:hidden;background:#f5f3ef">'+(m.bg?'<img src="'+m.bg+'" style="width:100%;height:100%;object-fit:cover">':'')+'<button class="mcls" onclick="clsM()">✕</button></div>';
  var gt=m.gi.map(function(gid){var ge=GENRES.find(function(x){return x.id===gid});return ge?'<span class="gtag">'+ge.l+'</span>':''}).join('');
  var provH=S.provs.length?'<p style="font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:2px;margin:14px 0 6px">Watch On</p><div class="prow">'+S.provs.map(function(p){var url=STREAM_URLS[p.n]||'#';return'<a href="'+url+'" target="_blank" rel="noopener" class="prov"><img src="'+p.l+'" alt="" onerror="this.style.display=\'none\'"><span>'+p.n+'</span></a>'}).join('')+'</div>':'';
  var inW=S.wheel.some(function(w){return w&&w.id===m.id});
  var bookHtml=BOOKS[m.id]?'<div class="book-note">📖 Based on: <strong>'+BOOKS[m.id]+'</strong></div>':'';
  var ratingLinks='<div class="rating-links"><span style="font-size:14px;font-weight:700;color:var(--ink)">★ '+m.v.toFixed(1)+'/10</span><a href="https://www.imdb.com/find/?q='+encodeURIComponent(m.t)+'" target="_blank">IMDb</a><a href="https://www.rottentomatoes.com/search?search='+encodeURIComponent(m.t)+'" target="_blank">Rotten Tomatoes</a></div>';

  return'<div class="overlay" onclick="clsM()"><div class="modal" onclick="event.stopPropagation()">'+tr
    +'<div style="padding:22px 26px 28px">'
    +'<h2 style="font-family:Instrument Serif,serif;font-size:26px;font-weight:400;margin-bottom:4px">'+m.t+'</h2>'
    +'<p style="font-size:12px;color:var(--mute);margin-bottom:14px">'+m.y+(m.mt==='tv'?' · TV Series':'')+'</p>'
    +'<p style="font-size:13px;line-height:1.75;color:#666;margin-bottom:14px">'+m.o+'</p>'
    +'<div style="margin-bottom:10px">'+gt+'</div>'
    +ratingLinks+provH+bookHtml
    +'<button onclick="addW(S.sel);clsM()" style="margin-top:16px;padding:10px 24px;border-radius:8px;background:'+(inW?'var(--accent2)':'var(--ink)')+';border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">'+(inW?'✓ On Wheel':'+ Add to Wheel')+'</button>'
    +'</div></div></div>';
}

function tgG(s){var i=S.genres.indexOf(s);if(i>=0)S.genres.splice(i,1);else S.genres.push(s);S.moods=[];S.mode=S.genres.length?'genre':'tab';S.q='';load()}
function tgM(id){var i=S.moods.indexOf(id);if(i>=0)S.moods.splice(i,1);else S.moods.push(id);S.genres=[];S.mode=S.moods.length?'mood':'tab';S.q='';load()}
function stab(id){S.tab=id;S.mode='tab';S.genres=[];S.moods=[];S.q='';load()}
function doS(){var el=document.getElementById('si');S.q=el?el.value:S.q;if(!S.q.trim())return;S.mode='search';S.genres=[];S.moods=[];load()}
function clr(){S.genres=[];S.moods=[];S.q='';S.mode='tab';load()}
function ldM(){if(!S.loading)load(S.page+1)}
function clsM(){S.sel=null;S.trail=null;S.provs=[];draw()}
function closeR(){S.result=null;S.resultTrail=null;S.resultProvs=[];draw()}

load();
</script>
</body>
</html>
